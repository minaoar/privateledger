name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and Upload Release Assets
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: privateledger-linux-amd64
          - goos: linux
            goarch: arm64
            output: privateledger-linux-arm64
          - goos: darwin
            goarch: amd64
            output: privateledger-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: privateledger-darwin-arm64
          - goos: windows
            goarch: amd64
            output: privateledger-windows-amd64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go build \
          -ldflags="-X 'main.Version=${{ steps.version.outputs.VERSION }}' -X 'main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
          -o ${{ matrix.output }} \
          ./cmd/privateledger

    - name: Create archive
      run: |
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip ${{ matrix.output }}.zip ${{ matrix.output }}
        else
          tar -czf ${{ matrix.output }}.tar.gz ${{ matrix.output }}
        fi

    - name: Upload Release Asset (tar.gz)
      if: matrix.goos != 'windows'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.output }}.tar.gz
        asset_name: ${{ matrix.output }}.tar.gz
        asset_content_type: application/gzip

    - name: Upload Release Asset (zip)
      if: matrix.goos == 'windows'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.output }}.zip
        asset_name: ${{ matrix.output }}.zip
        asset_content_type: application/zip
