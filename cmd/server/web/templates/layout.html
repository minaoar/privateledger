<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - PrivateLedger</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/app.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cash-coin"></i> PrivateLedger
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActivePage "dashboard"}}active{{end}}" href="/">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActivePage "transactions"}}active{{end}}" href="/transactions">
                            <i class="bi bi-list-ul"></i> Transactions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActivePage "categories"}}active{{end}}" href="/categories">
                            <i class="bi bi-tags"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActivePage "accounts"}}active{{end}}" href="/accounts">
                            <i class="bi bi-wallet2"></i> Accounts
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActivePage "import"}}active{{end}}" href="/import">
                            <i class="bi bi-upload"></i> Import
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid py-4">
            {{template "content" .}}
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 mt-5 border-top border-4" style="border-top-color: #2ecc71 !important; background-color: #f8f9fa;">
    <div class="container text-center">
        <p class="mb-1 fw-bold text-dark d-flex align-items-center justify-content-center gap-2">
            PrivateLedger 
            <span class="badge bg-success">v0.90.0</span>
            <span class="text-muted fw-light">|</span>
            <a href="/about" class="text-decoration-none fw-bold text-success small">About</a>
        </p>
        <p class="text-muted small mb-2">
            <i class="bi bi-shield-check text-success"></i> Your financial data stays on your machine!
        </p>
    </div>
</footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js Datalabels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
