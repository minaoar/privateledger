{{define "content"}}
<div class="row mb-4">
    <div class="col">
        <h1 class="h3 mb-0">Accounts</h1>
        <p class="text-muted">Manage your account name for bank and credit card</p>
    </div>
    <div class="col-auto">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAccountModal">
            <i class="bi bi-plus-circle"></i> Add Account
        </button>
    </div>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body" id="accountsList">
                {{if gt (len .Accounts) 0}}
                <div class="list-group list-group-flush">
                    {{range .Accounts}}
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">
                                <i class="bi bi-wallet2 text-primary"></i> {{.Name}}
                            </h6>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-primary me-2"
                                    onclick="openRenameModal({{.AccountID}}, '{{.Name}}')">
                                <i class="bi bi-pencil"></i> Rename
                            </button>
                            <button class="btn btn-sm btn-outline-danger"
                                    onclick="deleteAccount({{.AccountID}}, '{{.Name}}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                    {{end}}
                </div>
                {{else}}
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-wallet2 display-4"></i>
                    <p class="mt-3">No accounts yet. Add your first account to get started!</p>
                </div>
                {{end}}
            </div>
        </div>
    </div>
</div>

<!-- Add Account Modal -->
<div class="modal fade" id="addAccountModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Account</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="addAccountForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="accountName" class="form-label">Account Name</label>
                        <input type="text" class="form-control" id="accountName" name="name"
                               placeholder="e.g., TD Credit Card" required>
                        <div class="form-text">Choose a name you'll recognize</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Account</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Rename Account Modal -->
<div class="modal fade" id="renameAccountModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Rename Account</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="renameAccountForm">
                <input type="hidden" id="renameAccountId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="renameAccountName" class="form-label fw-semibold">
                            New Account Name <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control form-control-lg" id="renameAccountName" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('addAccountForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('accountName').value;

    try {
        const response = await fetch('/api/accounts', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ names: [name] })
        });

        const result = await response.json();

        if (response.ok) {
            showToast('Account added successfully!', 'success');
            bootstrap.Modal.getInstance(document.getElementById('addAccountModal')).hide();
            document.getElementById('addAccountForm').reset();
            // Reload page to show new account
            setTimeout(() => location.reload(), 1000);
        } else {
            const errorMsg = result.errors ? result.errors.join(', ') : (result.error || 'Failed to add account');
            showToast(errorMsg, 'danger');
        }
    } catch (error) {
        showToast('An error occurred', 'danger');
    }
});

function openRenameModal(accountId, currentName) {
    document.getElementById('renameAccountId').value = accountId;
    document.getElementById('renameAccountName').value = currentName;
    new bootstrap.Modal(document.getElementById('renameAccountModal')).show();
}

document.getElementById('renameAccountForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const accountId = document.getElementById('renameAccountId').value;
    const newName = document.getElementById('renameAccountName').value.trim();

    if (!newName) {
        showToast('Please enter an account name', 'warning');
        return;
    }

    try {
        const response = await fetch(`/api/accounts/${accountId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
        });

        if (response.ok) {
            showToast('Account renamed successfully!', 'success');
            bootstrap.Modal.getInstance(document.getElementById('renameAccountModal')).hide();
            setTimeout(() => location.reload(), 1000);
        } else {
            const error = await response.json();
            showToast(error.error || 'Failed to rename account', 'danger');
        }
    } catch (error) {
        showToast('An error occurred', 'danger');
    }
});

async function deleteAccount(id, name) {
    if (!confirmDelete(`Are you sure you want to delete "${name}"? This will also delete all associated transactions.`)) {
        return;
    }

    try {
        const response = await fetch(`/api/accounts/${id}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            showToast('Account deleted successfully', 'success');
            setTimeout(() => location.reload(), 1000);
        } else {
            const error = await response.json();
            showToast(error.error || 'Failed to delete account', 'danger');
        }
    } catch (error) {
        showToast('An error occurred', 'danger');
    }
}
</script>
{{end}}
